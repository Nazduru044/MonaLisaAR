<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mona Lisa AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Kullanıcı etkileşimi için Başlat Butonu tasarımı */
      #startButton {
        position: absolute;
        z-index: 1000;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        font-size: 18px;
        font-family: sans-serif;
        background-color: #2c3e50;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      #startButton:hover {
        background-color: #34495e;
      }
    </style>
  </head>
  <body>
    <button id="startButton">Deneyimi Başlat</button>

    <a-scene mindar-image="imageTargetSrc: ./mona.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="monaVideo" src="./mona.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-video src="#monaVideo" position="0 0 0" height="1.45" width="1" rotation="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const video = document.querySelector('#monaVideo');
        const target = document.querySelector('#target');
        const startButton = document.querySelector('#startButton');

        // Butona tıklandığında videonun oynatılabilmesi için tarayıcı engelini kaldırırız
        startButton.addEventListener('click', () => {
          startButton.style.display = 'none'; // Butonu gizle
          video.play().then(() => {
            video.pause(); // Oynatıp hemen duraklatıyoruz, sadece izin almak için
          }).catch((error) => {
            console.log("Video oynatma hatası:", error);
          });
        });

        // Kamera Mona Lisa'yı gördüğünde videoyu başlat
        target.addEventListener("targetFound", event => {
          console.log("Tablo bulundu!");
          video.play();
        });

        // Kamera Mona Lisa'dan uzaklaştığında videoyu durdur
        target.addEventListener("targetLost", event => {
          console.log("Tablo kaybedildi!");
          video.pause();
        });
      });
    </script>
  </body>
</html>
